spring.application.name=nutriscan
# (optional) remove this while debugging profiles to keep it simple
# spring.profiles.active=dev

# --- DB config (adapt to your Postgres) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/nutriscan_dev
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
logging.level.com.nutriscan=DEBUG

# --- JWT config (VERY IMPORTANT) ---
jwt.secret=change-this-super-secret-key-for-nutriscan-123456789
jwt.expiration-ms=86400000
jwt.header=Authorization
jwt.prefix=Bearer 
